name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # IMPORTANTE: cambia "TU_USUARIO" por tu nombre de usuario u organización de GitHub
  IMAGE_NAME_WEB: ghcr.io/TU_USUARIO/web_sftp_ia-web
  IMAGE_NAME_SFTP: ghcr.io/TU_USUARIO/web_sftp_ia-sftp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image (PHP/Apache)
        uses: docker/build-push-action@v5
        with:
          context: docker/web
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME_WEB }}:latest, ${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}

      - name: Build and push SFTP image (Alpine/SSH)
        uses: docker/build-push-action@v5
        with:
          context: docker/sftp
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME_SFTP }}:latest, ${{ env.IMAGE_NAME_SFTP }}:${{ github.sha }}
